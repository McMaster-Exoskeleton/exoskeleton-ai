# TCN Small Model Configuration
# Faster, fewer parameters, less capacity

name: tcn_small
type: tcn

# Architecture parameters
architecture:
  input_size: 28
  output_size: 4

  # Smaller architecture
  num_channels: [15, 15, 15, 15]  # 4 layers with 15 channels each
  kernel_size: 5
  dropout: 0.2
  spatial_dropout: false
  activation: ReLU
  norm: weight_norm

# Effective history = (5 - 1) * (2^4 - 1) + 1 = 4 * 15 + 1 = 61 timesteps
effective_history: 61  # timesteps
receptive_field_ms: 610  # milliseconds at 100Hz

normalization:
  enabled: false
  use_dataset_stats: true

initialization:
  conv_std: 0.01
  linear_std: 0.01

estimated_params: 18000
